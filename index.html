<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Hour Bites</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #fafafa;
      color: #333;
    }
    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    .post {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .post h2 {
      margin-top: 0;
    }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #777;
    }
    .rating {
      color: #e67e22;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>🌇 Golden Hour Bites</h1>
    <p>restaurant reviews + go to spots </p>
  </header>

  <div class="container">

    <div class="post">
      <h2>thai villa </h2>
      <p><strong>Location:</strong> NYC </p>
      <p class="rating">Rating: ★★★★★</p>
      <p>
        food was amazing 
      </p>
    </div>

  </div>

  <footer>
    <p>© 2026 Golden Hour Bites</p>
  </footer>
</body>
</html>
